<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Histórico — R2D Relatórios</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0f1117;--ink2:#374151;--ink3:#6b7280;--ink4:#9ca3af;
  --line:#e5e7eb;--line2:#f3f4f6;--surface:#fff;--bg:#f0f2f5;
  --accent:#1a56db;--accent2:#1e40af;--accent-bg:#eff6ff;
  --red:#dc2626;--green:#16a34a;
  --sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --sh:0 1px 3px rgba(0,0,0,.07);--shmd:0 4px 12px rgba(0,0,0,.1);
}
html,body{min-height:100%;font-family:var(--sans);font-size:14px;color:var(--ink);background:var(--bg)}

.topbar{background:#111827;display:flex;align-items:center;gap:0;padding:0 24px;height:52px;position:sticky;top:0;z-index:10}
.tb-brand{font-weight:700;font-size:15px;letter-spacing:.04em;color:#fff}
.tb-sep{width:1px;height:18px;background:#374151;margin:0 14px}
.tb-title{font-size:12px;color:#94a3b8}
.tb-spacer{flex:1}
.tb-link{color:#60a5fa;font-size:12px;text-decoration:none;padding:6px 12px;border-radius:5px;transition:background .15s}
.tb-link:hover{background:#1e3a5f}

.container{max-width:1100px;margin:0 auto;padding:32px 24px}

.page-header{margin-bottom:28px}
.page-title{font-size:22px;font-weight:700;color:var(--ink);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--ink3)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:16px 20px;box-shadow:var(--sh)}
.stat-val{font-size:28px;font-weight:700;color:var(--accent);font-family:var(--mono)}
.stat-label{font-size:11.5px;color:var(--ink3);margin-top:3px}

/* Search & filter */
.toolbar{display:flex;gap:10px;margin-bottom:18px;align-items:center}
.search-wrap{flex:1;position:relative}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink4);font-size:14px}
.search-inp{width:100%;padding:9px 10px 9px 32px;border:1.5px solid var(--line);border-radius:7px;font-size:13px;font-family:var(--sans);outline:none;background:#fff;color:var(--ink);transition:border-color .15s}
.search-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,86,219,.09)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--sans);transition:all .15s}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:var(--accent2)}
.btn-r{background:#fef2f2;color:var(--red);border:1px solid #fecaca;font-size:12px;padding:5px 10px}.btn-r:hover{background:#fee2e2}
.btn-dl{background:var(--accent-bg);color:var(--accent);border:1px solid #bfdbfe;font-size:12px;padding:5px 10px}.btn-dl:hover{background:#dbeafe}

/* Table */
.table-wrap{background:var(--surface);border:1px solid var(--line);border-radius:10px;box-shadow:var(--sh);overflow:hidden}
.rtable{width:100%;border-collapse:collapse}
.rtable thead{background:#f8fafc;border-bottom:1.5px solid var(--line)}
.rtable th{padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);text-align:left}
.rtable td{padding:13px 16px;font-size:13px;border-bottom:1px solid var(--line2);vertical-align:middle}
.rtable tr:last-child td{border-bottom:none}
.rtable tr:hover td{background:#fafbfc}
.rtable .mono{font-family:var(--mono);font-size:12px;color:var(--ink3)}
.badge{display:inline-flex;align-items:center;gap:3px;background:var(--line2);border:1px solid var(--line);border-radius:4px;font-size:10.5px;font-weight:600;color:var(--ink3);padding:2px 7px}
.agency-cell{font-weight:600;color:var(--ink)}
.date-cell{color:var(--ink3);font-size:12px;font-family:var(--mono)}
.actions-cell{display:flex;gap:6px;align-items:center}
.empty-state{text-align:center;padding:56px 24px;color:var(--ink4)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:600;color:var(--ink3);margin-bottom:6px}
.empty-sub{font-size:13px}

/* Toast */
.toastwrap{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:7px;z-index:200}
.toast{padding:9px 14px;border-radius:8px;font-size:12.5px;font-weight:500;box-shadow:var(--shmd);animation:ti .2s ease}
@keyframes ti{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast-ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.toast-err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}

@media(max-width:700px){
  .stats{grid-template-columns:1fr 1fr}
  .rtable th:nth-child(4),.rtable td:nth-child(4),
  .rtable th:nth-child(5),.rtable td:nth-child(5){display:none}
}
</style>
</head>
<body>

<div class="topbar">
  <span class="tb-brand">R2D</span>
  <div class="tb-sep"></div>
  <span class="tb-title">Histórico de Relatórios</span>
  <div class="tb-spacer"></div>
  <a href="/" class="tb-link">+ Novo Relatório</a>
</div>

<div class="container">
  <div class="page-header">
    <div class="page-title">Histórico de Relatórios</div>
    <div class="page-sub">Todos os relatórios gerados pela equipe — clique para baixar o PDF novamente</div>
  </div>

  <div class="stats" id="stats">
    <div class="stat-card"><div class="stat-val" id="s-total">—</div><div class="stat-label">Relatórios gerados</div></div>
    <div class="stat-card"><div class="stat-val" id="s-mes">—</div><div class="stat-label">Este mês</div></div>
    <div class="stat-card"><div class="stat-val" id="s-fotos">—</div><div class="stat-label">Fotos registradas</div></div>
    <div class="stat-card"><div class="stat-val" id="s-obras">—</div><div class="stat-label">Agências vistoriadas</div></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-inp" id="search" placeholder="Buscar por agência, O.S., fiscal, contrato..." oninput="filterRows()"/>
    </div>
    <button class="btn btn-p" onclick="location.href='/'">+ Novo relatório</button>
  </div>

  <div class="table-wrap">
    <table class="rtable">
      <thead>
        <tr>
          <th>Agência</th>
          <th>O.S.</th>
          <th>Fiscal / Contrato</th>
          <th>Fotos</th>
          <th>Data vistoria</th>
          <th>Gerado em</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div class="toastwrap" id="toastwrap"></div>

<script>
let ALL = [];

async function load(){
  try{
    const res = await fetch('/api/reports');
    ALL = await res.json();
    renderStats();
    renderTable(ALL);
  }catch(e){
    toast('Erro ao carregar histórico','err');
  }
}

function renderStats(){
  document.getElementById('s-total').textContent = ALL.length;
  const mes = new Date().toLocaleDateString('pt-BR',{month:'2-digit',year:'numeric'});
  const thisMes = ALL.filter(r => (r.created||'').startsWith(mes.split('/')[1]+'/' ) || 
    (r.created||'').includes('/'+new Date().getMonth()+1+'/')).length;
  // simpler: filter by current month/year string in created field
  const now = new Date();
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const yyyy = now.getFullYear();
  const mesCount = ALL.filter(r=>{
    if(!r.created) return false;
    // created format: dd/mm/yyyy hh:mm
    const parts = r.created.split('/');
    return parts[1]===mm && parts[2]&&parts[2].startsWith(String(yyyy));
  }).length;
  document.getElementById('s-mes').textContent = mesCount;
  document.getElementById('s-fotos').textContent = ALL.reduce((a,r)=>a+(r.n_photos||0),0);
  const agencias = new Set(ALL.map(r=>r.agency).filter(Boolean));
  document.getElementById('s-obras').textContent = agencias.size;
}

function renderTable(rows){
  const tbody = document.getElementById('tbody');
  if(!rows.length){
    tbody.innerHTML = `<tr><td colspan="7">
      <div class="empty-state">
        <div class="empty-icon">📂</div>
        <div class="empty-title">Nenhum relatório encontrado</div>
        <div class="empty-sub">Os relatórios gerados aparecerão aqui automaticamente</div>
      </div>
    </td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr data-id="${r.id}">
      <td>
        <div class="agency-cell">${esc(r.agency||'—')} <span class="badge">${esc(r.prefix||'—')}</span></div>
        <div style="font-size:11.5px;color:var(--ink3);margin-top:2px">${esc(r.address||'')}</div>
      </td>
      <td><span class="mono">${esc(r.os||'—')}</span></td>
      <td>
        <div style="font-size:12.5px">${esc(r.fiscal||'—')}</div>
        <div style="font-size:11.5px;color:var(--ink3)">${esc(r.contract||'')}</div>
      </td>
      <td><span class="badge">${r.n_photos||0} 📸</span></td>
      <td class="date-cell">${esc(r.date||'—')}</td>
      <td class="date-cell">${esc(r.created||'—')}</td>
      <td class="actions-cell">
        <a href="/api/download/${r.id}" class="btn btn-dl" title="Baixar PDF">⬇ PDF</a>
        <button class="btn btn-r" onclick="del('${r.id}')" title="Excluir">✕</button>
      </td>
    </tr>
  `).join('');
}

function filterRows(){
  const q = document.getElementById('search').value.toLowerCase();
  if(!q){ renderTable(ALL); return; }
  renderTable(ALL.filter(r =>
    (r.agency||'').toLowerCase().includes(q) ||
    (r.os||'').toLowerCase().includes(q) ||
    (r.fiscal||'').toLowerCase().includes(q) ||
    (r.contract||'').toLowerCase().includes(q) ||
    (r.address||'').toLowerCase().includes(q)
  ));
}

async function del(id){
  if(!confirm('Excluir este relatório do histórico? O PDF será removido permanentemente.')) return;
  await fetch('/api/reports/'+id, {method:'DELETE'});
  ALL = ALL.filter(r=>r.id!==id);
  renderStats(); filterRows();
  toast('Relatório excluído','ok');
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toast(msg,type='info'){
  const w=document.getElementById('toastwrap'),el=document.createElement('div');
  el.className='toast toast-'+type; el.textContent=msg; w.appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

load();
</script>
</body>
</html>
