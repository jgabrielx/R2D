<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>R2D — Relatório Fotográfico</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0f1117;--ink2:#374151;--ink3:#6b7280;--ink4:#9ca3af;
  --line:#e5e7eb;--line2:#f3f4f6;--surface:#ffffff;--bg:#eef0f4;
  --accent:#1a56db;--accent2:#1e40af;--accent-bg:#eff6ff;
  --red:#dc2626;--green:#16a34a;
  --r:6px;--rlg:10px;
  --sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --sh:0 1px 3px rgba(0,0,0,.07);--shmd:0 4px 12px rgba(0,0,0,.1);
}
html,body{height:100%;font-family:var(--sans);font-size:14px;color:var(--ink);background:var(--bg)}
input[type=file]{display:none}

/* Shell */
.shell{display:grid;grid-template-rows:52px 1fr;height:100vh;overflow:hidden}
.topbar{background:#111827;display:flex;align-items:center;gap:0;padding:0 20px}
.tb-logo-wrap{display:flex;align-items:center;gap:0;border-right:1px solid #2d3748;padding-right:16px;margin-right:16px}
.tb-logo-img{height:22px;filter:brightness(0) invert(1);opacity:.9}
.tb-title{font-size:12px;color:#94a3b8;font-weight:400;letter-spacing:.01em}
.tb-spacer{flex:1}
.tb-info{font-size:11px;color:#64748b}

/* Workspace */
.workspace{display:grid;grid-template-columns:440px 1fr;height:100%;overflow:hidden}

/* Editor */
.editor{display:flex;flex-direction:column;background:var(--surface);border-right:1px solid var(--line);overflow:hidden}
.etabs{display:flex;border-bottom:1px solid var(--line);flex-shrink:0;background:#fafafa}
.etab{padding:11px 15px;font-size:12.5px;font-weight:500;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.etab:hover{color:var(--ink);background:var(--line2)}
.etab.on{color:var(--accent);border-bottom-color:var(--accent);background:var(--accent-bg)}
.ebody{flex:1;overflow-y:auto;padding:20px}
.ebody::-webkit-scrollbar{width:4px}
.ebody::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
.efooter{border-top:1px solid var(--line);padding:12px 18px;display:flex;gap:8px;align-items:center;flex-shrink:0}

/* Forms */
.ftitle{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--ink4);margin-bottom:12px;margin-top:18px;display:flex;align-items:center;gap:8px}
.ftitle:first-child{margin-top:0}
.ftitle::after{content:'';flex:1;height:1px;background:var(--line)}
.fg{display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
label{font-size:10.5px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.04em}
input[type=text],select,textarea{width:100%;padding:7px 10px;border:1.5px solid var(--line);border-radius:var(--r);font-size:13px;font-family:var(--sans);color:var(--ink);background:#fff;outline:none;transition:border-color .15s,box-shadow .15s}
input[type=text]:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,86,219,.09)}
textarea{resize:vertical;min-height:68px;line-height:1.55}
input[type=text]::placeholder,textarea::placeholder{color:var(--ink4)}

/* Botões */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:var(--r);font-size:12.5px;font-weight:600;cursor:pointer;border:none;font-family:var(--sans);transition:all .15s;white-space:nowrap;line-height:1.3}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:var(--accent2)}
.btn-g{background:transparent;color:var(--ink2);border:1.5px solid var(--line)}.btn-g:hover{border-color:var(--ink3);color:var(--ink)}
.btn-r{background:#fef2f2;color:var(--red);border:1px solid #fecaca}.btn-r:hover{background:#fee2e2}
.btn-ok{background:var(--green);color:#fff}.btn-ok:hover{background:#15803d}
.btn-sm{padding:5px 9px;font-size:11.5px}
.btn-xs{padding:3px 7px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-ai{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;font-size:12px}
.btn-ai:hover{filter:brightness(1.1)}

/* Fotos */
.drop-zone{border:2px dashed var(--line);border-radius:var(--rlg);padding:22px;text-align:center;cursor:pointer;transition:all .15s;background:var(--line2)}
.drop-zone:hover{border-color:var(--accent);background:var(--accent-bg)}
.photo-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.pitem{border:1.5px solid var(--line);border-radius:var(--rlg);overflow:hidden;background:#fff}
.pitem-head{display:flex;align-items:center;gap:7px;padding:6px 10px;background:var(--line2);border-bottom:1px solid var(--line)}
.pnum{font-size:10px;font-weight:700;color:var(--accent);font-family:var(--mono)}
.pitem-body{display:grid;grid-template-columns:80px 1fr}
.pthumb{width:80px;height:64px;background:var(--line2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;border-right:1px solid var(--line);overflow:hidden;flex-shrink:0}
.pthumb img{width:100%;height:100%;object-fit:cover}
.pfields{padding:7px 9px;display:flex;flex-direction:column;gap:5px}
.pfields select,.pfields textarea,.pfields input[type=text]{font-size:11.5px;padding:4px 7px}
.pfields textarea{min-height:42px}

/* Tech */
.tcard{border:1.5px solid var(--line);border-radius:var(--rlg);margin-bottom:10px;background:#fff}
.tcard-h{padding:8px 12px;background:var(--line2);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:7px}
.tcard-b{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.sub-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink4);margin-bottom:3px}
.ilist{display:flex;flex-direction:column;gap:4px}
.irow{display:flex;gap:5px;align-items:flex-start}
.irow textarea{flex:1;font-size:11.5px;min-height:30px;padding:4px 7px}
.irm{background:none;border:none;color:var(--ink4);cursor:pointer;padding:4px;border-radius:3px;font-size:13px;line-height:1;flex-shrink:0}
.irm:hover{color:var(--red);background:#fef2f2}
.iadd{background:none;border:1px dashed var(--line);border-radius:var(--r);padding:4px 9px;font-size:11px;color:var(--ink3);cursor:pointer;width:100%;text-align:left;transition:all .15s;font-family:var(--sans)}
.iadd:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.chip{display:inline-flex;align-items:center;background:var(--line2);border:1px solid var(--line);border-radius:4px;font-size:10px;font-weight:700;color:var(--ink3);padding:1px 6px}

/* Preview panel */
.preview-panel{background:#d4d7dc;display:flex;flex-direction:column;overflow:hidden}
.preview-bar{background:#1e293b;display:flex;align-items:center;gap:10px;padding:7px 14px;flex-shrink:0}
.prev-title{font-size:12px;font-weight:600;color:#e2e8f0}
.prev-count{font-size:11px;color:#64748b}
.prev-spacer{flex:1}
.pscroll{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;align-items:center;gap:14px}
.pscroll::-webkit-scrollbar{width:5px}
.pscroll::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:3px}
.plabel{font-size:10px;color:#6b7280;font-family:var(--mono);margin-bottom:4px;align-self:flex-start;margin-left:2px}

/* PDF pages */
.pdf-pg{background:#fff;width:760px;min-height:1075px;box-shadow:0 3px 16px rgba(0,0,0,.22);padding:26px 38px;display:flex;flex-direction:column;position:relative;font-family:'DM Sans',sans-serif;font-size:8.5px}

/* Cover */
.cv-outer{position:absolute;inset:10px;border:1.5px solid #222;pointer-events:none}
.cv-inner{position:absolute;inset:17px;border:.5px solid #555;pointer-events:none}
.cv-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
.cv-logos{display:flex;align-items:center;justify-content:center;gap:32px;padding:0 60px 20px;border-bottom:1px solid #ddd;width:100%}
.cv-logo img{max-height:52px;max-width:160px;object-fit:contain}
.cv-date{font-size:12px;font-weight:700;text-align:center;margin-top:36px;color:#111}

/* Header */
.ph{display:flex;align-items:center;gap:0;border-bottom:1px solid #ccc;padding-bottom:7px;margin-bottom:10px}
.ph-logo{display:flex;align-items:center}
.ph-logo img{max-height:24px;max-width:80px;object-fit:contain}
.ph-center{flex:1;text-align:center;font-size:8px;font-weight:700;letter-spacing:.09em;color:#333}
.ph-right{display:flex;align-items:center;justify-content:flex-end}
.ph-right img{max-height:20px;max-width:76px;object-fit:contain}

/* Seção bar */
.sb{background:#444;color:#fff;font-size:7.5px;font-weight:700;letter-spacing:.07em;padding:4px 9px;margin-bottom:7px}
.sb-row{display:flex;justify-content:space-between;align-items:center}

/* Info table */
.itable{border:1px solid #ccc;font-size:8px;margin-bottom:12px;width:100%}
.irow2{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #eee}
.irow2.full{grid-template-columns:1fr}
.irow2:last-child{border-bottom:none}
.icell{padding:3.5px 7px;border-right:1px solid #eee}
.icell:last-child{border-right:none}
.ilabel{display:block;font-size:7px;font-weight:700;color:#444}
.ival{display:block;font-size:8px;color:#111;min-height:11px}

/* TOC */
.toc{font-size:8px}
.toc-row{display:flex;align-items:flex-end;gap:4px;padding:2px 3px}
.toc-row.main{font-weight:700}
.toc-num{width:28px;flex-shrink:0;color:#333}
.toc-title{color:#333;white-space:nowrap}
.toc-dots{flex:1;border-bottom:1px dotted #ccc;margin-bottom:2px}
.toc-page{width:20px;text-align:right;color:#777;font-family:var(--mono);flex-shrink:0}

/* Body text */
.bt{font-size:8px;line-height:1.65;color:#374151;margin-bottom:8px}
.bh{font-size:8px;font-weight:700;color:#111;margin-bottom:3px;margin-top:6px}

/* Photo page */
.pp-hdr{background:#555;color:#fff;display:flex;justify-content:space-between;padding:3.5px 8px;font-size:7.5px;font-weight:700;letter-spacing:.06em;margin-bottom:7px}
.pp-block{border:1px solid #333;margin-bottom:7px;overflow:hidden}
.pp-title-row{background:#f3f4f6;display:flex;align-items:center;gap:7px;border-bottom:1px solid #e5e7eb;padding:3.5px 7px}
.pp-num{font-size:7.5px;font-weight:700;color:#1e40af;font-family:var(--mono)}
.pp-name{font-size:8px;font-weight:700;color:#333}
.pp-img{height:196px;background:#f8fafc;display:flex;align-items:center;justify-content:center;overflow:hidden}
.pp-img img{width:100%;height:100%;object-fit:cover}
.pp-img-ph{color:#d1d5db;font-size:24px;text-align:center}
.pp-caption{padding:4px 7px;font-size:7.5px;color:#374151;text-align:center;border-top:1px solid #eee}

/* Tech */
.tech-h{font-size:9px;font-weight:700;color:#111;margin-top:7px;margin-bottom:3px}
.tech-sub{font-size:8px;font-weight:700;color:#333;margin-bottom:2px}
.tech-item{font-size:7.5px;color:#374151;padding-left:9px;margin-bottom:2px;line-height:1.5;position:relative}
.tech-item::before{content:'•';position:absolute;left:2px;color:#888}

/* Page num */
.pgn{position:absolute;bottom:14px;right:24px;font-size:7px;color:#aaa;font-family:var(--mono)}

/* Loading */
.overlay{position:fixed;inset:0;background:rgba(10,14,23,.65);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(3px)}
.ovbox{background:#fff;border-radius:12px;padding:34px 42px;text-align:center;min-width:260px;box-shadow:0 20px 40px rgba(0,0,0,.2)}
.spin{width:38px;height:38px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 14px}
@keyframes sp{to{transform:rotate(360deg)}}
.ovt{font-size:14px;font-weight:600;margin-bottom:5px}
.ovs{font-size:12px;color:var(--ink3)}

/* Toast */
.toastwrap{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:7px;z-index:200}
.toast{padding:9px 14px;border-radius:8px;font-size:12.5px;font-weight:500;box-shadow:var(--shmd);animation:ti .2s ease;display:flex;align-items:center;gap:7px}
@keyframes ti{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast-ok{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.toast-err{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.toast-info{background:var(--accent-bg);color:#1e40af;border:1px solid #bfdbfe}

/* Misc */
.flex{display:flex}.ic{align-items:center}.jb{justify-content:space-between}.f1{flex:1}
.text-muted{color:var(--ink3)}.text-xs{font-size:11px}
.mt2{margin-top:8px}.mt3{margin-top:12px}.mb2{margin-bottom:8px}
</style>
</head>

function hoje(){ return new Date().toLocaleDateString('pt-BR'); }

// TABS

const TABS = [
  {label:'Dados Gerais', icon:'📋'},
  {label:'Fotos',        icon:'📸'},
  {label:'Técnico',      icon:'🔧'},
];

function renderTabs(){
  document.getElementById('etabs').innerHTML = TABS.map((t,i)=>`
    <div class="etab ${i===S.tab?'on':''}" onclick="setTab(${i})">
      <span>${t.icon}</span>${t.label}
    </div>`).join('');
}
function setTab(i){ S.tab=i; renderTabs(); renderEditor(); navBtns(); }
function navBtns(){
  document.getElementById('btn-prev').disabled = S.tab===0;
  const last = S.tab===TABS.length-1;
  document.getElementById('btn-next').style.display  = last?'none':'';
  document.getElementById('btn-gerar').style.display = last?'':'none';
}
document.getElementById('btn-prev').onclick = ()=>{ if(S.tab>0) setTab(S.tab-1); };
document.getElementById('btn-next').onclick = ()=>{ if(S.tab<TABS.length-1) setTab(S.tab+1); };

// EDITOR
// ═══════════════════════════════════════════════
function renderEditor(){
  const b = document.getElementById('ebody');
  if(S.tab===0) b.innerHTML = tabInfo();
  else if(S.tab===1) b.innerHTML = tabPhotos();
  else b.innerHTML = tabTech();
  bindFields();
  updateCounter();
}

// ── Tab 0 ────────────────────────────────────
function tabInfo(){
  const d=S.d;
  const T1 = 'O presente relatório apresenta os registros da visita técnica realizada na unidade do Banco do Brasil, com o objetivo de levantamento das condições existentes no local para futura execução dos serviços contratados.';
  const T2 = 'Este documento tem por objeto o registro detalhado da visita técnica realizada na agência supracitada, contemplando aspectos estruturais, arquitetônicos, elétricos, hidráulicos, de climatização e demais instalações relevantes à execução dos serviços de obra ou manutenção.';
  const T3 = 'O relatório fotográfico tem como finalidade registrar as condições observadas durante a visita técnica, incluindo análise de conformidade, identificação de possíveis problemas e recomendações técnicas. Tem como objetivo documentar a situação atual, fornecer diretrizes para ações corretivas e subsidiar tomadas de decisão.';
  if(!d.presentation) d.presentation = T1;
  if(!d.objective)    d.objective    = T2;
  if(!d.purpose)      d.purpose      = T3;
  const fi=(k,ph)=>`<input type="text" data-k="${k}" value="${es(d[k])}" placeholder="${ph||''}"/>`;
  const ta=(k,ph)=>`<textarea data-k="${k}" placeholder="${ph||''}">${es(d[k])}</textarea>`;
  return `
    <div class="ftitle">Identificação</div>
    <div class="row2">
      <div class="fg"><label>Agência</label>${fi('agency','Resende')}</div>
      <div class="fg"><label>Prefixo</label>${fi('prefix','131')}</div>
    </div>
    <div class="fg"><label>Endereço</label>${fi('address','Av. Albino de Almeida, 182 – Campos Elíseos – Resende/RJ')}</div>
    <div class="row2">
      <div class="fg"><label>Data da Vistoria</label>${fi('date','dd/mm/aaaa')}</div>
      <div class="fg"><label>Fiscal</label>${fi('fiscal','Nome do fiscal')}</div>
    </div>
    <div class="row2">
      <div class="fg"><label>Contrato</label>
        <select data-k="contract" onchange="S.d.contract=this.value;renderPreview()">
          <option value="">— Selecione o contrato —</option>
          ${CONTRACTS.map(c=>`<option value="${c}" ${S.d.contract===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="fg"><label>O.S.</label>${fi('os','260025402')}</div>
    </div>
    <div class="fg"><label>Título do Relatório Técnico</label>${fi('report_title','Cobertura, Laje e Telhado')}</div>
    <div class="ftitle">Textos padrão <span style="font-weight:400;text-transform:none;color:var(--ink4)">— editáveis se necessário</span></div>
    <div class="fg"><label>1.1 Apresentação</label>${ta('presentation','')}</div>
    <div class="fg"><label>1.2 Objeto</label>${ta('objective','')}</div>
    <div class="fg"><label>1.3 Finalidade</label>${ta('purpose','')}</div>
  `;
}

// ── Tab 1 ────────────────────────────────────
function tabPhotos(){

    return `
      <div class="pitem">
        <div class="pitem-head">

          <div class="pthumb" onclick="upImg(${i})">${thumb}</div>
          <div class="pfields">
            <div class="fg" style="margin:0"><label>Grupo/Área</label>
              <input type="text" value="${es(p.group)}" onchange="up(${i},'group',this.value)" placeholder="Ex: Telhado, Área coberta, Fachada..." style="font-size:12px;padding:5px 8px"/></div>
            <div class="fg" style="margin:0"><label>Legenda</label>
              <textarea onchange="up(${i},'caption',this.value)" placeholder="Descrição da foto...">${es(p.caption)}</textarea></div>
          </div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="drop-zone" id="dz" onclick="addPics()">
      <div style="font-size:26px;margin-bottom:6px">📁</div>
      <div style="font-size:13px;font-weight:500;color:var(--ink2)">Arraste ou clique para adicionar fotos</div>
      <div style="font-size:11px;color:var(--ink4);margin-top:3px">JPG, PNG, WEBP — múltiplas de uma vez</div>
    </div>
    <div class="flex ic jb mt2 mb2">
      <span style="font-size:11.5px;color:var(--ink3);font-weight:500">${S.photos.length} foto${S.photos.length!==1?'s':''}</span>
      <button class="btn btn-g btn-xs" onclick="addBlank()">+ Em branco</button>
    </div>
    <div class="photo-list">${items}</div>`;
}

// ── Tab 2 ────────────────────────────────────
function tabTech(){
  const cards = S.tech.map((s,i)=>{
    const probs = s.problems.map((p,j)=>`
      <div class="irow">
        <textarea onchange="updItem(${i},'problems',${j},this.value)">${es(p)}</textarea>
        <button class="irm" onclick="rmItem(${i},'problems',${j})">✕</button>
      </div>`).join('');
    const sols = s.solutions.map((p,j)=>`
      <div class="irow">
        <textarea onchange="updItem(${i},'solutions',${j},this.value)">${es(p)}</textarea>
        <button class="irm" onclick="rmItem(${i},'solutions',${j})">✕</button>
      </div>`).join('');
    return `
      <div class="tcard">
        <div class="tcard-h">
          <span class="chip">${i+2}.</span>
          <input type="text" style="flex:1;border:none;background:transparent;font-size:12.5px;font-weight:600;outline:none;padding:0 4px"
            value="${es(s.title)}" onchange="updTitle(${i},this.value)" placeholder="Nome da área"/>
          <button class="btn btn-r btn-xs" onclick="rmSec(${i})">Remover</button>
        </div>
        <div class="tcard-b">
          <div><div class="sub-label">⚠ Problemas identificados</div>
            <div class="ilist">${probs}</div>
            <button class="iadd mt2" onclick="addItem(${i},'problems')">+ Adicionar problema</button>
          </div>
          <div><div class="sub-label">✓ Soluções técnicas</div>
            <div class="ilist">${sols}</div>
            <button class="iadd" onclick="addItem(${i},'solutions')">+ Adicionar solução</button>
          </div>
        </div>
      </div>`;
  }).join('');

  const empty = !S.tech.length ? `
    <div style="text-align:center;padding:28px 16px;color:var(--ink4)">
      <div style="font-size:28px;margin-bottom:8px">🔧</div>
      <div style="font-size:13px;font-weight:500;margin-bottom:4px">Nenhuma seção ainda</div>
      <div style="font-size:11.5px">Use a IA ou adicione manualmente</div>
    </div>` : '';

  return `
    <div class="flex ic" style="gap:8px;margin-bottom:14px">
      <button class="btn btn-ai" onclick="gerarIA()">✦ Gerar com IA</button>
      <span class="text-xs text-muted">${S.photos.length} foto(s) com legenda</span>
    </div>
    <div class="fg"><label>Considerações Iniciais</label>
      <textarea data-k="initial_considerations" rows="3" placeholder="Abertura do relatório técnico...">${es(S.d.initial_considerations)}</textarea></div>
    <div class="flex ic jb mt3 mb2">
      <span style="font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink4)">Seções Técnicas</span>
      <button class="btn btn-g btn-xs" onclick="addSec()">+ Seção</button>
    </div>
    ${cards}${empty}
    <div class="fg mt3"><label>Avaliação Geral</label>
      <textarea data-k="general_assessment" rows="3" placeholder="Conclusão e recomendações finais...">${es(S.d.general_assessment)}</textarea></div>
  `;
}

function bindFields(){
  document.querySelectorAll('[data-k]').forEach(el=>{
    el.addEventListener('input',()=>{ S.d[el.dataset.k]=el.value; renderPreview(); });
  });
  const dz=document.getElementById('dz');
  if(dz){
    dz.addEventListener('dragover',e=>e.preventDefault());
    dz.addEventListener('drop',async e=>{
      e.preventDefault();
      for(const f of Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'))){
        S.photos.push({image:await rf(f),group:'Área coberta',caption:''});
      }
      renderEditor(); renderPreview();
    });
  }
}

function updateCounter(){
  document.getElementById('tb-count').textContent =
    `${S.photos.length} foto${S.photos.length!==1?'s':''} · ${S.tech.length} seção${S.tech.length!==1?'ões':''}`;
}

// Photo ops
async function addPics(){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.multiple=true;
  inp.onchange=async()=>{
    for(const f of inp.files) S.photos.push({image:await rf(f),group:'Área coberta',caption:''});
    renderEditor();renderPreview();
  };inp.click();
}
function addBlank(){ S.photos.push({image:'',group:'Área coberta',caption:''}); renderEditor();renderPreview(); }
function rp(i){ S.photos.splice(i,1); renderEditor();renderPreview(); }
function mv(i,d){ const j=i+d; if(j<0||j>=S.photos.length)return; [S.photos[i],S.photos[j]]=[S.photos[j],S.photos[i]]; renderEditor();renderPreview(); }
function up(i,k,v){ S.photos[i][k]=v; renderPreview(); }
function upImg(i){
  const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=async()=>{ S.photos[i].image=await rf(inp.files[0]); renderEditor();renderPreview(); };
  inp.click();
}

// Tech ops
function addSec(){ S.tech.push({title:'Nova Seção',problems:[''],solutions:['']}); renderEditor();renderPreview(); }
function rmSec(i){ S.tech.splice(i,1); renderEditor();renderPreview(); }
function updTitle(i,v){ S.tech[i].title=v; renderPreview(); }
function addItem(i,k){ S.tech[i][k].push(''); renderEditor(); }
function rmItem(i,k,j){ S.tech[i][k].splice(j,1); renderEditor();renderPreview(); }
function updItem(i,k,j,v){ S.tech[i][k][j]=v; renderPreview(); }

// ═══════════════════════════════════════════════
// IA
// ═══════════════════════════════════════════════
async function gerarIA(){
  if(!S.photos.length){ toast('Adicione fotos com legendas antes.','err'); return; }
  ovShow('Analisando com IA...','Identificando patologias e sugerindo soluções');
  const caps = S.photos.map((p,i)=>`2.${i+1} [${p.group}]: ${p.caption||'(sem legenda)'}`).join('\n');
  try{
    const res = await fetch('/api/ia',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({captions:caps})
    });
    const parsed=await res.json();
    if(parsed.sections) S.tech=parsed.sections.map(s=>({title:s.title,problems:s.problems||[],solutions:s.solutions||[]}));
    if(parsed.initial_considerations) S.d.initial_considerations=parsed.initial_considerations;
    if(parsed.general_assessment) S.d.general_assessment=parsed.general_assessment;
    ovHide(); renderEditor(); renderPreview();
    toast('Relatório técnico gerado pela IA!','ok');
  }catch(e){ ovHide(); toast('Erro ao consultar IA.','err'); }
}

// ═══════════════════════════════════════════════
// PREVIEW
// ═══════════════════════════════════════════════
function renderPreview(){
  const pages=buildPages();
  document.getElementById('pscroll').innerHTML=
    pages.map((pg,i)=>`<div><div class="plabel">Página ${i+1}</div><div class="pdf-pg">${pg}</div></div>`).join('');
  document.getElementById('prev-count').textContent=`${pages.length} página${pages.length!==1?'s':''}`;
}

function buildPages(){
  const pgs=[];
  pgs.push(pgCover());
  pgs.push(pgInfoSummary());
  pgs.push(pgDados());
  for(let i=0;i<S.photos.length;i+=2) pgs.push(pgPhotos(i));
  pgs.push(pgTech());
  return pgs;
}

function hdr(){
  return `<div class="ph">
    <div class="ph-logo"><img src="${LOGO_R2D}" alt="R2D"/></div>
    <div class="ph-center">RELATÓRIO FOTOGRÁFICO</div>
    <div class="ph-right"><img src="${LOGO_BB}" alt="BB"/></div>
  </div>`;
}

function pgCover(){
  const d=S.d;
  return `
    <div class="cv-outer"></div><div class="cv-inner"></div>
    <div class="cv-body">
      <div class="cv-logos">
        <div class="cv-logo"><img src="${LOGO_R2D}" alt="R2D"/></div>
        <div style="width:1px;height:44px;background:#ddd"></div>
        <div class="cv-logo"><img src="${LOGO_BB}" alt="BB"/></div>
      </div>
      <div style="font-size:13px;font-weight:700;letter-spacing:.08em;text-align:center;margin-top:28px;color:#111;text-transform:uppercase">Relatório Fotográfico</div>
      <div class="cv-date" style="margin-top:12px">Rio de Janeiro ${x(d.date)||'—'}</div>
    </div>
    <div class="pgn">Capa</div>`;
}

function pgInfoSummary(){
  const d=S.d;
  let toc=`
    <div class="toc-row main"><span class="toc-num">1.</span><span class="toc-title">DADOS GERAIS</span><span class="toc-dots"></span><span class="toc-page"></span></div>
    <div class="toc-row"><span class="toc-num">1.1</span><span class="toc-title">Apresentação do documento</span><div class="toc-dots"></div><span class="toc-page">2</span></div>
    <div class="toc-row"><span class="toc-num">1.2</span><span class="toc-title">Objeto do Documento</span><div class="toc-dots"></div><span class="toc-page">2</span></div>
    <div class="toc-row"><span class="toc-num">1.3</span><span class="toc-title">Finalidade do Documento</span><div class="toc-dots"></div><span class="toc-page">2</span></div>
    <div class="toc-row main" style="margin-top:3px"><span class="toc-num">2.</span><span class="toc-title">RELATÓRIO FOTOGRÁFICO</span><span class="toc-dots"></span><span class="toc-page">3</span></div>`;
  let pg=3;
  S.photos.forEach((p,i)=>{
    if(i>0&&i%2===0) pg++;
    toc+=`<div class="toc-row"><span class="toc-num">2.${i+1}</span><span class="toc-title">${x(p.group)}</span><div class="toc-dots"></div><span class="toc-page">${pg}</span></div>`;
  });
  return `${hdr()}
    <div class="sb">INFORMAÇÕES GERAIS</div>
    <div class="itable">
      <div class="irow2"><div class="icell"><span class="ilabel">Agência</span><span class="ival">${x(d.agency)}</span></div><div class="icell"><span class="ilabel">Prefixo</span><span class="ival">${x(d.prefix)}</span></div></div>
      <div class="irow2 full"><div class="icell"><span class="ilabel">Endereço</span><span class="ival">${x(d.address)}</span></div></div>
      <div class="irow2"><div class="icell"><span class="ilabel">Data</span><span class="ival">${x(d.date)}</span></div><div class="icell"><span class="ilabel">Fiscal</span><span class="ival">${x(d.fiscal)}</span></div></div>
      <div class="irow2"><div class="icell"><span class="ilabel">Contrato</span><span class="ival">${x(d.contract)}</span></div><div class="icell"><span class="ilabel">O.S.</span><span class="ival">${x(d.os)}</span></div></div>
    </div>
    <div class="sb">SUMÁRIO</div>
    <div class="toc" style="margin-top:5px">${toc}</div>
    <div class="pgn">1</div>`;
}

function pgDados(){
  const d=S.d;
  const T1_DEFAULT = 'O presente relatório apresenta os registros da visita técnica realizada na unidade do Banco do Brasil, com o objetivo de levantamento das condições existentes no local para futura execução dos serviços contratados.';
  const T2_DEFAULT = 'Este documento tem por objeto o registro detalhado da visita técnica realizada na agência supracitada, contemplando aspectos estruturais, arquitetônicos, elétricos, hidráulicos, de climatização e demais instalações relevantes à execução dos serviços de obra ou manutenção.';
  const T3_DEFAULT = 'O relatório fotográfico tem como finalidade registrar as condições observadas durante a visita técnica, incluindo análise de conformidade, identificação de possíveis problemas e recomendações técnicas. Tem como objetivo documentar a situação atual, fornecer diretrizes para ações corretivas e subsidiar tomadas de decisão.';
  const t1=d.presentation||T1_DEFAULT;
  const t2=d.objective||T2_DEFAULT;
  const t3=d.purpose||T3_DEFAULT;
  return `${hdr()}
    <div class="sb" style="display:inline-block;margin-bottom:6px">1. &nbsp; DADOS GERAIS</div>
    <div class="bt">Rio de Janeiro, ${x(d.date)}</div>
    <div class="bh">1.1 &nbsp; APRESENTAÇÃO</div><div class="bt">${x(t1)}</div>
    <div class="bh">1.2 &nbsp; OBJETO DO DOCUMENTO</div><div class="bt">${x(t2)}</div>
    <div class="bh">1.3 &nbsp; FINALIDADE DO DOCUMENTO</div><div class="bt">${x(t3)}</div>
    <div class="pgn">2</div>`;
}

function pgPhotos(start){
  const d=S.d;
  const pn=3+Math.floor(start/2);
  const blocks=S.photos.slice(start,start+2).map((p,rel)=>{
    const idx=start+rel;
    const img=p.image?`<img src="${p.image}"/>`:`<div class="pp-img-ph">📷<br/><span style="font-size:9px;color:#bbb">Sem imagem</span></div>`;
    return `<div class="pp-block">
      <div class="pp-title-row"><span class="pp-num">2.${idx+1}</span><span class="pp-name">${x(p.group)}</span></div>
      <div class="pp-img">${img}</div>
      <div class="pp-caption">${x(p.caption)||'.'}</div>
    </div>`;
  }).join('');
  return `${hdr()}
    <div class="pp-hdr"><span>RELATÓRIO FOTOGRÁFICO</span><span>${x(d.date)}</span></div>
    ${blocks}
    <div class="pgn">${pn}</div>`;
}

function pgTech(){
  const d=S.d;
  const pn=3+Math.ceil(S.photos.length/2);
  const ini=d.initial_considerations||'O presente relatório técnico foi elaborado com base no Relatório Fotográfico. A vistoria identificou patologias construtivas relevantes, evidenciando falhas recorrentes de impermeabilização, intervenções paliativas e ausência de dispositivos de segurança.';
  const gen=d.general_assessment||'A edificação apresenta sistema de cobertura e impermeabilização em estado crítico. Recomenda-se a execução das soluções propostas de forma integrada.';
  let secs='';
  S.tech.forEach((s,i)=>{
    const ps=(s.problems||[]).filter(Boolean).map(p=>`<div class="tech-item">${x(p)}</div>`).join('');
    const ss=(s.solutions||[]).filter(Boolean).map(p=>`<div class="tech-item">${x(p)}</div>`).join('');
    secs+=`<div class="tech-h">${i+2}. ${x(s.title).toUpperCase()}</div>
      ${ps?`<div class="tech-sub">Problemas Identificados</div>${ps}`:''}
      ${ss?`<div class="tech-sub" style="margin-top:3px">Soluções Técnicas</div>${ss}`:''}`;
  });
  return `${hdr()}
    <div style="font-size:8px;line-height:1.55;color:#374151;margin-bottom:7px">
      <b>TÍTULO:</b> Relatório Técnico de Vistoria – ${x(d.report_title)||'Cobertura e Instalações'}<br/>
      <b>AGÊNCIA:</b> ${x(d.client_name)} – ${x(d.agency)} – Prefixo ${x(d.prefix)}<br/>
      <b>ENDEREÇO:</b> ${x(d.address)}<br/><b>DATA:</b> ${x(d.date)}
    </div>
    <div style="border-top:1px solid #e5e7eb;margin-bottom:7px"></div>
    <div class="tech-h">1. CONSIDERAÇÕES INICIAIS</div>
    <div class="bt">${x(ini)}</div>
    ${secs}
    <div class="tech-h">${S.tech.length+2}. AVALIAÇÃO GERAL</div>
    <div class="bt">${x(gen)}</div>
    <div class="pgn">${pn}</div>`;
}

// ═══════════════════════════════════════════════
// PDF GENERATION
// ═══════════════════════════════════════════════
async function gerarPDF(){
  ovShow('Gerando PDF...','Montando páginas e inserindo imagens...');
  try{
    const res=await fetch('/api/generate',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        data:S.d,
        photos:S.photos.map(p=>({image:p.image||'',group:p.group,caption:p.caption||''})),
        tech_sections:S.tech,
        logo_r2d:LOGO_R2D,
        logo_client:LOGO_BB
      })
    });
    if(!res.ok) throw new Error('Servidor '+res.status);
    const j=await res.json();
    if(!j.ok) throw new Error(j.error);
    const a=document.createElement('a');
    a.href='/api/download/'+j.id;
    a.download='relatorio_'+(S.d.agency||'obra')+'_'+(S.d.os||'os')+'.pdf';
    a.click();
    toast('PDF gerado e salvo no histórico!','ok');
  }catch(e){ toast('Erro: '+e.message,'err'); }
  ovHide();
}

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function es(s){ return s?String(s).replace(/"/g,'&quot;'):''; }
function x(s){ if(!s)return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function rf(f){ return new Promise((r,j)=>{ const rd=new FileReader(); rd.onload=e=>r(e.target.result); rd.onerror=j; rd.readAsDataURL(f); }); }
function ovShow(t,s){ document.getElementById('ovt').textContent=t; document.getElementById('ovs').textContent=s; document.getElementById('overlay').style.display='flex'; }
function ovHide(){ document.getElementById('overlay').style.display='none'; }
function toast(msg,type='info'){
  const w=document.getElementById('toastwrap'),el=document.createElement('div');
  el.className=`toast toast-${type}`;el.textContent=msg;w.appendChild(el);
  setTimeout(()=>el.remove(),3800);
}

// ── Init ─────────────────────────────────────
renderTabs(); renderEditor(); renderPreview(); navBtns();
</script>
</body>
</html>
